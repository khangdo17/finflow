name: 'finflow'
version: '1.0.0'
config-version: 2

profile: 'finflow'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  finflow:
    staging:
      +materialized: view
      +schema: dbt_dev

    intermediate:
      +materialized: table
      +schema: dbt_dev

    marts:
      +materialized: table
      +schema: dbt_dev
