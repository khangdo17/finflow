finflow:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'finflow') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'finflow_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'finflow_db') }}"
      schema: dbt_dev
      threads: 4
